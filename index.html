<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>특수문자 검사기</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Design Tokens ─────────────────────────────────────────── */
    :root {
      --bg:           #f5f6fa;
      --surface:      #ffffff;
      --surface2:     #f0f1f7;
      --border:       #e2e4ef;
      --border-focus: #7b8cde;

      --accent:       #4f63d2;
      --accent-light: #eef0fc;
      --accent-mid:   #c5caf5;
      --accent-hover: #3a4fc0;

      --red:          #c0152e;
      --red-dim:      #f4a0aa;
      --red-light:    #fff0f3;
      --red-mid:      #ffc0cb;

      --green:        #22a861;
      --green-light:  #edfaf4;
      --green-mid:    #a7e8c5;

      --text-primary:   #1a1d2e;
      --text-secondary: #6b7080;
      --text-muted:     #a8abbe;

      --shadow: 0 4px 16px rgba(79,99,210,.10), 0 2px 6px rgba(0,0,0,.05);

      --r-sm:   8px;
      --r-md:   12px;
      --r-lg:   16px;
      --r-full: 999px;
    }

    /* ── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Base ──────────────────────────────────────────────────── */
    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 20px 80px;
    }

    .page-wrapper {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ────────────────────────────────────────────────── */
    .site-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-light);
      border: 1px solid var(--accent-mid);
      border-radius: var(--r-full);
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: .04em;
      margin-bottom: 14px;
    }

    .site-header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -.03em;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .site-header p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* ── Card ──────────────────────────────────────────────────── */
    .card {
      width: 100%;
      background: var(--surface);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 24px 28px;
      margin-bottom: 16px;
    }

    .card__title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .09em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
      font-family: 'DM Mono', monospace;
    }

    /* ── Char Tags ─────────────────────────────────────────────── */
    .chars-area {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      min-height: 36px;
    }

    .chars-area__empty {
      font-size: 13px;
      color: var(--text-muted);
    }

    .char-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--accent-light);
      border: 1.5px solid var(--accent-mid);
      border-radius: var(--r-full);
      padding: 5px 8px 5px 12px;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      color: var(--accent);
      animation: pop-in .15s ease;
    }

    .char-tag__remove {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--accent);
      opacity: .45;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      font-size: 15px;
      line-height: 1;
      font-weight: 600;
      transition: opacity .15s, background .15s;
    }

    .char-tag__remove:hover {
      opacity: 1;
      background: rgba(79,99,210,.13);
    }

    @keyframes pop-in {
      from { transform: scale(.75); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    /* ── Add Char Row ──────────────────────────────────────────── */
    .add-char-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }

    .add-char-row__input {
      width: 46px;
      height: 36px;
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      background: var(--surface2);
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      color: var(--text-primary);
      outline: none;
      transition: border-color .2s, background .2s;
    }

    .add-char-row__input:focus {
      border-color: var(--border-focus);
      background: var(--surface);
    }

    .add-char-row__hint {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ── Textarea ──────────────────────────────────────────────── */
    .input-textarea {
      width: 100%;
      min-height: 160px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      color: var(--text-primary);
      font-family: 'Pretendard', sans-serif;
      font-size: 15px;
      line-height: 1.85;
      padding: 14px 16px;
      resize: vertical;
      outline: none;
      transition: border-color .2s, background .2s;
    }

    .input-textarea:focus {
      border-color: var(--border-focus);
      background: var(--surface);
    }

    .input-textarea::placeholder { color: var(--text-muted); }

    .char-count {
      text-align: right;
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
    }

    /* ── Controls ──────────────────────────────────────────────── */
    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: none;
      border-radius: var(--r-sm);
      font-family: 'Pretendard', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s, box-shadow .15s;
    }

    .btn--primary {
      background: var(--accent);
      color: #fff;
      padding: 10px 22px;
      font-size: 14px;
      box-shadow: 0 2px 8px rgba(79,99,210,.22);
    }

    .btn--primary:hover  { background: var(--accent-hover); box-shadow: 0 4px 14px rgba(79,99,210,.28); }
    .btn--primary:active { transform: scale(.97); }

    .btn--ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1.5px solid var(--border);
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
    }

    .btn--ghost:hover { color: var(--text-primary); border-color: #c5c9de; }

    .btn--sm {
      height: 36px;
      padding: 0 16px;
      font-size: 13px;
    }

    .btn--danger-ghost {
      background: transparent;
      color: var(--red);
      border: 1.5px solid var(--red-mid);
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      border-radius: var(--r-sm);
    }

    .btn--danger-ghost:hover {
      background: var(--red-light);
    }

    .btn--green-ghost {
      background: transparent;
      color: var(--green);
      border: 1.5px solid var(--green-mid);
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      border-radius: var(--r-sm);
    }

    .btn--green-ghost:hover {
      background: var(--green-light);
    }

    .shortcut-hint {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 3px 9px;
    }

    /* ── Result Card ───────────────────────────────────────────── */
    .result-card {
      width: 100%;
      background: var(--surface);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
      display: none;
    }

    .result-card.visible {
      display: block;
      animation: slide-down .25s ease;
    }

    @keyframes slide-down {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-card__topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .result-card__label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .09em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
    }

    .result-card__body {
      padding: 20px;
      font-size: 15px;
      line-height: 2;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* ── Badges ────────────────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: var(--r-full);
      padding: 4px 11px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge--error {
      background: var(--red-light);
      color: var(--red);
      border: 1px solid var(--red-mid);
    }

    .badge--ok {
      background: var(--green-light);
      color: var(--green);
      border: 1px solid var(--green-mid);
    }

    /* ── Highlight marks ───────────────────────────────────────── */
    /* Dimmed state (default) */
    mark.highlight {
      background: var(--red-dim);
      color: #fff;
      border-radius: 4px;
      padding: 1px 4px;
      font-weight: 700;
      position: relative;
      cursor: pointer;
      transition: background .15s;
    }

    /* Active / selected state */
    mark.highlight.is-active {
      background: var(--red);
    }

    mark.highlight:hover::after {
      content: 'U+' attr(data-code);
      position: absolute;
      bottom: calc(100% + 4px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--text-primary);
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      padding: 3px 7px;
      border-radius: 5px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 10;
    }

    /* ── Found Chars List ──────────────────────────────────────── */
    .found-list {
      border-top: 1px solid var(--border);
      padding: 16px 20px 20px;
    }

    .found-list__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .found-list__title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
    }

    .found-list__hint {
      font-size: 11px;
      color: var(--text-muted);
    }

    .found-list__grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    /* ── Found Chip ────────────────────────────────────────────── */
    .found-chip {
      display: inline-flex;
      align-items: center;
      gap: 0;
      background: var(--red-light);
      border: 1.5px solid var(--red-mid);
      border-radius: var(--r-full);
      overflow: hidden;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--red);
      font-weight: 500;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
      user-select: none;
    }

    .found-chip.is-selected {
      border-color: var(--red);
      box-shadow: 0 0 0 2px rgba(192,21,46,.18);
    }

    .found-chip__main {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px 5px 12px;
    }

    .found-chip__code  { font-size: 10px; color: #f08090; }

    .found-chip__count {
      background: rgba(192,21,46,.13);
      border-radius: var(--r-full);
      padding: 1px 7px;
      font-size: 11px;
      font-weight: 700;
    }

    /* Action buttons inside chip */
    .found-chip__actions {
      display: flex;
      align-items: stretch;
      border-left: 1.5px solid var(--red-mid);
    }

    .found-chip__action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      border-left: 1px solid var(--red-mid);
      cursor: pointer;
      color: var(--red);
      opacity: .55;
      padding: 0 9px;
      font-size: 13px;
      height: 100%;
      transition: opacity .15s, background .15s;
      font-family: 'Pretendard', sans-serif;
      font-weight: 600;
      white-space: nowrap;
    }

    .found-chip__action-btn:first-child {
      border-left: none;
    }

    .found-chip__action-btn:hover {
      opacity: 1;
      background: rgba(192,21,46,.1);
    }

    .found-chip__action-btn[title="허용 목록에 추가"]:hover {
      color: var(--green);
      background: var(--green-light);
    }

    /* ── Replace Row (appears inside chip expanded) ─────────────── */
    .replace-row {
      border-top: 1px solid var(--border);
      padding: 10px 14px;
      display: none;
      align-items: center;
      gap: 8px;
      background: #fafafa;
    }

    .replace-row.visible {
      display: flex;
    }

    .replace-row__label {
      font-size: 11px;
      color: var(--text-secondary);
      white-space: nowrap;
      font-family: 'Pretendard', sans-serif;
    }

    .replace-row__input {
      width: 52px;
      height: 30px;
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      background: var(--surface);
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      color: var(--text-primary);
      outline: none;
      transition: border-color .2s;
    }

    .replace-row__input:focus { border-color: var(--border-focus); }

    /* ── Toast ─────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--text-primary);
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: var(--r-full);
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
      transition: opacity .2s, transform .2s;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<div class="page-wrapper">

  <!-- ── Header ── -->
  <header class="site-header">
    <div class="logo-chip">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
        <circle cx="6" cy="6" r="5.5" stroke="currentColor" stroke-width="1.1"/>
        <path d="M4 6.3l1.4 1.4 3-3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      특수문자 검사기
    </div>
    <h1>비허용 특수문자를 찾아드려요</h1>
    <p>문단을 입력하면 허용 목록에 없는 특수문자를 자동으로 하이라이트합니다.</p>
  </header>

  <!-- ── Allowed Chars ── -->
  <section class="card" aria-label="허용 특수문자 목록">
    <h2 class="card__title">허용 특수문자 목록</h2>
    <div class="chars-area" id="charsArea" role="list"></div>
    <div class="add-char-row">
      <input
        class="add-char-row__input"
        id="addCharInput"
        maxlength="2"
        placeholder="+"
        aria-label="추가할 특수문자"
      >
      <button class="btn btn--primary btn--sm" id="addCharBtn">추가</button>
      <span class="add-char-row__hint">특수문자 입력 후 추가 · × 버튼으로 삭제</span>
    </div>
  </section>

  <!-- ── Input ── -->
  <section class="card" aria-label="검사할 문단 입력">
    <h2 class="card__title">검사할 문단</h2>
    <textarea
      class="input-textarea"
      id="inputText"
      placeholder="여기에 검사할 문단을 입력하세요..."
      aria-label="검사할 문단"
    ></textarea>
    <p class="char-count"><span id="charCount">0</span>자</p>
    <div class="controls">
      <button class="btn btn--primary" id="checkBtn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <circle cx="6" cy="6" r="5.3" stroke="white" stroke-width="1.4"/>
          <path d="M10.5 10.5l2 2" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        검사하기
      </button>
      <button class="btn btn--ghost" id="clearBtn">초기화</button>
      <span class="shortcut-hint" aria-label="단축키">Ctrl + Enter</span>
    </div>
  </section>

  <!-- ── Result ── -->
  <section class="result-card" id="resultCard" aria-live="polite" aria-label="검사 결과">
    <div class="result-card__topbar">
      <span class="result-card__label">검사 결과</span>
      <span id="resultBadge"></span>
    </div>
    <div class="result-card__body" id="resultBody"></div>
    <div id="foundList"></div>
  </section>

</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
  // ── Constants ──────────────────────────────────────────────────
  const ALLOWED_BASE_RE = /[\uAC00-\uD7A3\u1100-\u11FF\u3130-\u318Fa-zA-Z0-9\s]/;

  const SVG = {
    warn:  `<svg width="11" height="11" viewBox="0 0 11 11" fill="none" aria-hidden="true"><circle cx="5.5" cy="5.5" r="5" stroke="currentColor" stroke-width="1.1"/><path d="M5.5 3.5v2.5M5.5 7.5h.01" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>`,
    check: `<svg width="11" height="11" viewBox="0 0 11 11" fill="none" aria-hidden="true"><circle cx="5.5" cy="5.5" r="5" stroke="currentColor" stroke-width="1.1"/><path d="M3 5.5l2 2 3.5-3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  };

  // ── State ──────────────────────────────────────────────────────
  let allowedChars  = ['.', ',', '·', "'", '"', '-', '/'];
  let selectedChar  = null;   // currently selected bad char
  let lastBadMap    = {};     // { char -> count } from last check

  // ── DOM Cache ──────────────────────────────────────────────────
  const $ = id => document.getElementById(id);

  const dom = {
    charsArea:    $('charsArea'),
    addCharInput: $('addCharInput'),
    addCharBtn:   $('addCharBtn'),
    inputText:    $('inputText'),
    charCount:    $('charCount'),
    checkBtn:     $('checkBtn'),
    clearBtn:     $('clearBtn'),
    resultCard:   $('resultCard'),
    resultBadge:  $('resultBadge'),
    resultBody:   $('resultBody'),
    foundList:    $('foundList'),
    toast:        $('toast'),
  };

  // ── Utilities ──────────────────────────────────────────────────
  function escHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function toUnicode(ch) {
    return ch.codePointAt(0).toString(16).toUpperCase().padStart(4, '0');
  }

  let toastTimer = null;
  function showToast(msg) {
    dom.toast.textContent = msg;
    dom.toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => dom.toast.classList.remove('show'), 2200);
  }

  // ── Core Logic ─────────────────────────────────────────────────
  function isAllowed(ch) {
    return ALLOWED_BASE_RE.test(ch) || allowedChars.includes(ch);
  }

  function analyzeText(text) {
    let html = '';
    const badMap = {};

    for (const ch of text) {
      if (isAllowed(ch)) {
        html += escHtml(ch);
      } else {
        const code = toUnicode(ch);
        // data-char stores the raw char for click-matching
        html += `<mark class="highlight" data-char="${escHtml(ch)}" data-code="${code}">${escHtml(ch)}</mark>`;
        badMap[ch] = (badMap[ch] || 0) + 1;
      }
    }

    return { html, badMap };
  }

  // ── Selection: highlight active char in result body ────────────
  function applySelection() {
    dom.resultBody.querySelectorAll('mark.highlight').forEach(el => {
      const ch = el.dataset.char;
      el.classList.toggle('is-active', ch === selectedChar);
    });
  }

  function selectChar(ch) {
    selectedChar = (selectedChar === ch) ? null : ch; // toggle
    applySelection();
    updateChipSelection();
  }

  function updateChipSelection() {
    dom.foundList.querySelectorAll('.found-chip').forEach(chip => {
      chip.classList.toggle('is-selected', chip.dataset.char === selectedChar);
    });
  }

  // ── Render Functions ───────────────────────────────────────────
  function renderCharTags() {
    dom.charsArea.innerHTML = '';

    if (allowedChars.length === 0) {
      dom.charsArea.innerHTML = '<span class="chars-area__empty">허용된 특수문자가 없습니다.</span>';
      return;
    }

    const fragment = document.createDocumentFragment();
    allowedChars.forEach((ch, i) => {
      const tag = document.createElement('span');
      tag.className = 'char-tag';
      tag.setAttribute('role', 'listitem');

      const label = document.createTextNode(ch);
      const btn = document.createElement('button');
      btn.className = 'char-tag__remove';
      btn.textContent = '×';
      btn.setAttribute('aria-label', `${ch} 삭제`);
      btn.addEventListener('click', () => removeAllowedChar(i));

      tag.appendChild(label);
      tag.appendChild(btn);
      fragment.appendChild(tag);
    });

    dom.charsArea.appendChild(fragment);
  }

  function renderResultBadge(totalBad) {
    if (totalBad > 0) {
      dom.resultBadge.innerHTML =
        `<span class="badge badge--error">${SVG.warn} 비허용 문자 ${totalBad}개 발견</span>`;
    } else {
      dom.resultBadge.innerHTML =
        `<span class="badge badge--ok">${SVG.check} 이상 없음</span>`;
    }
  }

  function renderFoundList(badMap) {
    if (Object.keys(badMap).length === 0) {
      dom.foundList.innerHTML = '';
      return;
    }

    const fragment = document.createDocumentFragment();

    // Header
    const header = document.createElement('div');
    header.className = 'found-list';
    const headerInner = document.createElement('div');
    headerInner.className = 'found-list__header';
    headerInner.innerHTML =
      `<span class="found-list__title">발견된 문자</span>
       <span class="found-list__hint">클릭하면 해당 문자만 진하게 표시됩니다</span>`;
    header.appendChild(headerInner);

    const grid = document.createElement('div');
    grid.className = 'found-list__grid';

    Object.entries(badMap)
      .sort(([, a], [, b]) => b - a)
      .forEach(([ch, cnt]) => {
        const chip = buildFoundChip(ch, cnt);
        grid.appendChild(chip);
      });

    header.appendChild(grid);
    fragment.appendChild(header);
    dom.foundList.innerHTML = '';
    dom.foundList.appendChild(fragment);
  }

  function buildFoundChip(ch, cnt) {
    const chip = document.createElement('div');
    chip.className = 'found-chip';
    chip.dataset.char = ch;

    // ── Main clickable area ──
    const main = document.createElement('div');
    main.className = 'found-chip__main';
    main.innerHTML =
      `<span>${escHtml(ch)}</span>
       <span class="found-chip__code">U+${toUnicode(ch)}</span>
       <span class="found-chip__count">${cnt}회</span>`;
    main.addEventListener('click', () => selectChar(ch));

    // ── Action buttons ──
    const actions = document.createElement('div');
    actions.className = 'found-chip__actions';

    // Button: 허용 목록에 추가
    const addBtn = document.createElement('button');
    addBtn.className = 'found-chip__action-btn';
    addBtn.title = '허용 목록에 추가';
    addBtn.setAttribute('aria-label', `${ch} 허용 목록에 추가`);
    addBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="margin-right:3px"><circle cx="6" cy="6" r="5.5" stroke="currentColor" stroke-width="1.1"/><path d="M6 3.5v5M3.5 6h5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>허용`;
    addBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      addToAllowList(ch);
    });

    // Button: 전체 바꾸기 (toggle replace row)
    const replaceBtn = document.createElement('button');
    replaceBtn.className = 'found-chip__action-btn';
    replaceBtn.title = '전체 바꾸기';
    replaceBtn.setAttribute('aria-label', `${ch} 전체 바꾸기`);
    replaceBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="margin-right:3px"><path d="M1.5 3.5h6a2 2 0 0 1 0 4h-5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/><path d="M4 6 1.5 3.5 4 1" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 8.5h-6a2 2 0 0 1 0-4h1" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" opacity=".4"/></svg>바꾸기`;
    replaceBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleReplaceRow(chip, ch);
    });

    actions.appendChild(addBtn);
    actions.appendChild(replaceBtn);

    // ── Replace row (hidden by default) ──
    const replaceRow = document.createElement('div');
    replaceRow.className = 'replace-row';
    replaceRow.dataset.for = ch;

    const label = document.createElement('span');
    label.className = 'replace-row__label';
    label.textContent = '바꿀 문자:';

    const input = document.createElement('input');
    input.className = 'replace-row__input';
    input.maxLength = 4;
    input.placeholder = '입력';
    input.setAttribute('aria-label', `${ch}을 바꿀 문자`);

    const confirmBtn = document.createElement('button');
    confirmBtn.className = 'btn btn--primary btn--sm';
    confirmBtn.textContent = '전체 바꾸기';
    confirmBtn.addEventListener('click', () => {
      doReplace(ch, input.value);
    });

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') doReplace(ch, input.value);
    });

    replaceRow.appendChild(label);
    replaceRow.appendChild(input);
    replaceRow.appendChild(confirmBtn);

    // Wrap chip + replace row
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'display:inline-flex;flex-direction:column;border-radius:var(--r-full);overflow:hidden;';

    // When replace row is open, adjust wrapper border-radius
    chip.appendChild(main);
    chip.appendChild(actions);
    wrapper.appendChild(chip);
    wrapper.appendChild(replaceRow);

    return wrapper;
  }

  // ── Actions ────────────────────────────────────────────────────
  function addAllowedChar() {
    const val = dom.addCharInput.value.trim();

    if (!val) { showToast('추가할 특수문자를 입력해주세요.'); return; }
    if (ALLOWED_BASE_RE.test(val)) { showToast('한글, 영문, 숫자는 기본 허용됩니다.'); dom.addCharInput.value = ''; return; }
    if (allowedChars.includes(val)) { showToast('이미 목록에 있는 문자입니다.'); dom.addCharInput.value = ''; return; }

    allowedChars.push(val);
    renderCharTags();
    dom.addCharInput.value = '';
    dom.addCharInput.focus();
  }

  function removeAllowedChar(index) {
    allowedChars.splice(index, 1);
    renderCharTags();
  }

  /** Add a bad char directly to the allow list from found chips */
  function addToAllowList(ch) {
    if (allowedChars.includes(ch)) {
      showToast('이미 허용 목록에 있습니다.'); return;
    }
    allowedChars.push(ch);
    renderCharTags();
    showToast(`'${ch}' 을(를) 허용 목록에 추가했습니다.`);
    // Re-run check so the char is no longer highlighted
    runCheck(false);
  }

  /** Toggle the replace row for a given chip */
  function toggleReplaceRow(chip, ch) {
    const wrapper = chip.parentElement;
    const row = wrapper.querySelector('.replace-row');
    const isOpen = row.classList.contains('visible');

    // Close all other replace rows first
    dom.foundList.querySelectorAll('.replace-row.visible').forEach(r => {
      r.classList.remove('visible');
      r.parentElement.style.borderRadius = 'var(--r-full)';
    });

    if (!isOpen) {
      row.classList.add('visible');
      wrapper.style.borderRadius = 'var(--r-sm)';
      row.querySelector('input').focus();
    }
  }

  /** Replace all occurrences of `fromChar` in the textarea with `toChar` */
  function doReplace(fromChar, toChar) {
    if (toChar === '') {
      showToast('바꿀 문자를 입력해주세요.'); return;
    }
    const text = dom.inputText.value;
    const count = [...text].filter(c => c === fromChar).length;
    if (count === 0) { showToast('바꿀 문자가 없습니다.'); return; }

    dom.inputText.value = text.split(fromChar).join(toChar);
    updateCharCount();
    showToast(`'${fromChar}' → '${toChar}' 으로 ${count}개 바꿨습니다.`);

    // Re-run check to reflect changes
    runCheck(false);
  }

  function runCheck(scrollToResult = true) {
    const text = dom.inputText.value;
    if (!text) { dom.resultCard.classList.remove('visible'); return; }

    const { html, badMap } = analyzeText(text);
    lastBadMap = badMap;
    selectedChar = null; // reset selection on new check

    const totalBad = Object.values(badMap).reduce((sum, n) => sum + n, 0);

    dom.resultBody.innerHTML = html;
    renderResultBadge(totalBad);
    renderFoundList(badMap);

    // Click handler on result body marks
    dom.resultBody.addEventListener('click', e => {
      const mark = e.target.closest('mark.highlight');
      if (mark) selectChar(mark.dataset.char);
    });

    // Re-trigger animation
    dom.resultCard.classList.remove('visible');
    void dom.resultCard.offsetWidth;
    dom.resultCard.classList.add('visible');

    if (scrollToResult) {
      setTimeout(() => dom.resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
    }
  }

  function clearAll() {
    dom.inputText.value = '';
    dom.charCount.textContent = '0';
    dom.resultCard.classList.remove('visible');
    selectedChar = null;
    lastBadMap = {};
  }

  function updateCharCount() {
    dom.charCount.textContent = dom.inputText.value.length.toLocaleString();
  }

  // ── Event Listeners ────────────────────────────────────────────
  dom.addCharBtn.addEventListener('click', addAllowedChar);
  dom.addCharInput.addEventListener('keydown', e => { if (e.key === 'Enter') addAllowedChar(); });

  dom.checkBtn.addEventListener('click', () => runCheck(true));
  dom.clearBtn.addEventListener('click', clearAll);

  dom.inputText.addEventListener('input', updateCharCount);
  dom.inputText.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') runCheck(true);
  });

  // ── Init ───────────────────────────────────────────────────────
  renderCharTags();
</script>
</body>
</html>
