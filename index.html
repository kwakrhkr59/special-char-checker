<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>특수문자 검사기</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f6fa;
    --surface: #ffffff;
    --surface2: #f0f1f7;
    --border: #e2e4ef;
    --border-focus: #7b8cde;
    --accent: #4f63d2;
    --accent-light: #eef0fc;
    --accent-mid: #c5caf5;
    --red: #e53e5e;
    --red-light: #fff0f3;
    --red-mid: #ffc0cb;
    --green: #22a861;
    --green-light: #edfaf4;
    --text-primary: #1a1d2e;
    --text-secondary: #6b7080;
    --text-muted: #a8abbe;
    --shadow-sm: 0 1px 3px rgba(79,99,210,0.07), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(79,99,210,0.10), 0 2px 6px rgba(0,0,0,0.05);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-full: 999px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 56px 20px 80px;
  }

  .page-wrapper {
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 36px;
  }

  .logo-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-light);
    border: 1px solid var(--accent-mid);
    border-radius: var(--radius-full);
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.04em;
    margin-bottom: 14px;
  }

  header h1 {
    font-size: 28px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.03em;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  header p {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 400;
    line-height: 1.6;
  }

  /* Card */
  .card {
    width: 100%;
    background: var(--surface);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-md);
    border: 1px solid var(--border);
    padding: 24px 28px;
    margin-bottom: 16px;
  }

  .card-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
    font-family: 'DM Mono', monospace;
  }

  /* Allowed chars manager */
  .chars-area {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    min-height: 36px;
  }

  .char-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--accent-light);
    border: 1.5px solid var(--accent-mid);
    border-radius: var(--radius-full);
    padding: 5px 8px 5px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    animation: popIn 0.15s ease;
  }

  @keyframes popIn {
    from { transform: scale(0.75); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .char-tag button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--accent);
    opacity: 0.45;
    padding: 0;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    transition: opacity 0.15s, background 0.15s;
    font-size: 15px;
    line-height: 1;
    font-weight: 600;
  }

  .char-tag button:hover {
    opacity: 1;
    background: rgba(79,99,210,0.13);
  }

  .add-char-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
  }

  .add-char-input {
    width: 46px;
    height: 36px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface2);
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  .add-char-input:focus {
    border-color: var(--border-focus);
    background: var(--surface);
  }

  .add-char-btn {
    height: 36px;
    padding: 0 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Pretendard', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  .add-char-btn:hover { background: #3a4fc0; }
  .add-char-btn:active { transform: scale(0.96); }

  .char-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: 2px;
  }

  /* Textarea */
  textarea {
    width: 100%;
    min-height: 160px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-md);
    color: var(--text-primary);
    font-family: 'Pretendard', sans-serif;
    font-size: 15px;
    line-height: 1.85;
    padding: 14px 16px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  textarea:focus {
    border-color: var(--border-focus);
    background: var(--surface);
  }

  textarea::placeholder { color: var(--text-muted); }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 22px;
    font-family: 'Pretendard', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    box-shadow: 0 2px 8px rgba(79,99,210,0.22);
  }

  .btn-primary:hover { background: #3a4fc0; box-shadow: 0 4px 14px rgba(79,99,210,0.28); }
  .btn-primary:active { transform: scale(0.97); }

  .btn-ghost {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    color: var(--text-secondary);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    font-family: 'Pretendard', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }

  .btn-ghost:hover { color: var(--text-primary); border-color: #c5c9de; }

  .shortcut-hint {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 3px 9px;
  }

  /* Result card */
  .result-card {
    width: 100%;
    background: var(--surface);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-md);
    border: 1px solid var(--border);
    overflow: hidden;
    display: none;
  }

  .result-card.visible {
    display: block;
    animation: slideDown 0.25s ease;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .result-topbar-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }

  .badge-error {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--red-light);
    color: var(--red);
    border: 1px solid var(--red-mid);
    border-radius: var(--radius-full);
    padding: 4px 11px;
    font-size: 12px;
    font-weight: 600;
  }

  .badge-ok {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--green-light);
    color: var(--green);
    border: 1px solid #a7e8c5;
    border-radius: var(--radius-full);
    padding: 4px 11px;
    font-size: 12px;
    font-weight: 600;
  }

  .result-text-area {
    padding: 20px;
    font-size: 15px;
    line-height: 2;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text-primary);
  }

  mark.bad-char {
    background: var(--red);
    color: #fff;
    border-radius: 4px;
    padding: 1px 4px;
    font-weight: 700;
    position: relative;
    cursor: default;
  }

  mark.bad-char:hover::after {
    content: 'U+' attr(data-code);
    position: absolute;
    bottom: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--text-primary);
    color: #fff;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 3px 7px;
    border-radius: 5px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 10;
  }

  .found-divider {
    height: 1px;
    background: var(--border);
    margin: 0 20px;
  }

  .found-section {
    padding: 16px 20px 20px;
  }

  .found-section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    font-family: 'DM Mono', monospace;
  }

  .found-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .found-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--red-light);
    border: 1.5px solid var(--red-mid);
    border-radius: var(--radius-full);
    padding: 5px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--red);
    font-weight: 500;
  }

  .found-chip .fc-code {
    font-size: 10px;
    color: #f08090;
  }

  .found-chip .fc-count {
    background: rgba(229,62,94,0.13);
    border-radius: var(--radius-full);
    padding: 1px 7px;
    font-size: 11px;
    font-weight: 700;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--text-primary);
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 20px;
    border-radius: var(--radius-full);
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="page-wrapper">

  <header>
    <div class="logo-chip">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="margin-right:2px">
        <circle cx="6" cy="6" r="5.5" stroke="currentColor" stroke-width="1.1"/>
        <path d="M4 6.3l1.4 1.4 3-3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      특수문자 검사기
    </div>
    <h1>비허용 특수문자를 찾아드려요</h1>
    <p>문단을 입력하면 허용 목록에 없는 특수문자를 자동으로 하이라이트합니다.</p>
  </header>

  <!-- Allowed chars card -->
  <div class="card">
    <div class="card-title">허용 특수문자 목록</div>
    <div class="chars-area" id="charsArea"></div>
    <div class="add-char-row">
      <input class="add-char-input" id="addCharInput" maxlength="2" placeholder="+">
      <button class="add-char-btn" id="addCharBtn">추가</button>
      <span class="char-hint">특수문자 입력 후 추가 · × 버튼으로 삭제</span>
    </div>
  </div>

  <!-- Input card -->
  <div class="card">
    <div class="card-title">검사할 문단</div>
    <textarea id="inputText" placeholder="여기에 검사할 문단을 입력하세요..."></textarea>
    <div class="controls">
      <button class="btn-primary" id="checkBtn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="6" cy="6" r="5.3" stroke="white" stroke-width="1.4"/>
          <path d="M10.5 10.5l2 2" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        검사하기
      </button>
      <button class="btn-ghost" id="clearBtn">초기화</button>
      <span class="shortcut-hint">Ctrl + Enter</span>
    </div>
  </div>

  <!-- Result card -->
  <div class="result-card" id="resultCard">
    <div class="result-topbar">
      <span class="result-topbar-label">검사 결과</span>
      <span id="resultBadge"></span>
    </div>
    <div class="result-text-area" id="resultTextArea"></div>
    <div id="foundSection"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  let allowedChars = ['·', "'", '"', '-', '/'];

  function renderTags() {
    const area = document.getElementById('charsArea');
    area.innerHTML = '';
    if (allowedChars.length === 0) {
      area.innerHTML = '<span style="font-size:13px;color:var(--text-muted);">허용된 특수문자가 없습니다.</span>';
      return;
    }
    allowedChars.forEach((ch, i) => {
      const tag = document.createElement('span');
      tag.className = 'char-tag';
      const label = document.createTextNode(ch);
      const btn = document.createElement('button');
      btn.textContent = '×';
      btn.title = '삭제';
      btn.addEventListener('click', () => {
        allowedChars.splice(i, 1);
        renderTags();
      });
      tag.appendChild(label);
      tag.appendChild(btn);
      area.appendChild(tag);
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  document.getElementById('addCharBtn').addEventListener('click', () => {
    const input = document.getElementById('addCharInput');
    const val = input.value;
    if (!val) { showToast('추가할 특수문자를 입력해주세요.'); return; }
    if (/[\uAC00-\uD7A3a-zA-Z0-9\s]/.test(val)) {
      showToast('한글, 영문, 숫자는 기본 허용됩니다.'); input.value = ''; return;
    }
    if (allowedChars.includes(val)) {
      showToast('이미 목록에 있는 문자입니다.'); input.value = ''; return;
    }
    allowedChars.push(val);
    renderTags();
    input.value = '';
    input.focus();
  });

  document.getElementById('addCharInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('addCharBtn').click();
  });

  function isAllowed(ch) {
    if (/[\uAC00-\uD7A3\u1100-\u11FF\u3130-\u318F]/.test(ch)) return true;
    if (/[a-zA-Z0-9]/.test(ch)) return true;
    if (/\s/.test(ch)) return true;
    if (allowedChars.includes(ch)) return true;
    return false;
  }

  function toHex(ch) {
    return ch.codePointAt(0).toString(16).toUpperCase().padStart(4, '0');
  }

  function esc(ch) {
    return ch.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function check() {
    const text = document.getElementById('inputText').value;
    const resultCard = document.getElementById('resultCard');
    const resultTextArea = document.getElementById('resultTextArea');
    const resultBadge = document.getElementById('resultBadge');
    const foundSection = document.getElementById('foundSection');

    if (!text) { resultCard.classList.remove('visible'); return; }

    let html = '';
    const badMap = {};

    for (const ch of text) {
      if (!isAllowed(ch)) {
        const code = toHex(ch);
        html += `<mark class="bad-char" data-code="${code}">${esc(ch)}</mark>`;
        badMap[ch] = (badMap[ch] || 0) + 1;
      } else {
        html += esc(ch);
      }
    }

    const total = Object.values(badMap).reduce((a,b)=>a+b,0);
    resultTextArea.innerHTML = html;

    if (total > 0) {
      resultBadge.innerHTML = `<span class="badge-error">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
          <circle cx="5.5" cy="5.5" r="5" stroke="currentColor" stroke-width="1.1"/>
          <path d="M5.5 3.5v2.5M5.5 7.5h.01" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        비허용 문자 ${total}개 발견
      </span>`;

      const chips = Object.entries(badMap).sort((a,b)=>b[1]-a[1]).map(([ch,cnt]) =>
        `<span class="found-chip">
          <span>${esc(ch)}</span>
          <span class="fc-code">U+${toHex(ch)}</span>
          <span class="fc-count">${cnt}회</span>
        </span>`
      ).join('');

      foundSection.innerHTML = `
        <div class="found-divider"></div>
        <div class="found-section">
          <div class="found-section-title">발견된 문자</div>
          <div class="found-grid">${chips}</div>
        </div>`;
    } else {
      resultBadge.innerHTML = `<span class="badge-ok">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
          <circle cx="5.5" cy="5.5" r="5" stroke="currentColor" stroke-width="1.1"/>
          <path d="M3 5.5l2 2 3.5-3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        이상 없음
      </span>`;
      foundSection.innerHTML = '';
    }

    resultCard.classList.remove('visible');
    void resultCard.offsetWidth; // reflow for re-animation
    resultCard.classList.add('visible');
  }

  document.getElementById('checkBtn').addEventListener('click', check);
  document.getElementById('clearBtn').addEventListener('click', () => {
    document.getElementById('inputText').value = '';
    document.getElementById('resultCard').classList.remove('visible');
  });
  document.getElementById('inputText').addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') check();
  });

  renderTags();
</script>
</body>
</html>
